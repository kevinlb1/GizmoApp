# Example nginx location block when the app is mounted at /myapp/
# For named derived deployments, prefer the generated snippet from
#   <checkout>/var/generated/nginx-location.conf
# The Flask app is prefix-aware, so proxy_pass intentionally keeps the URI intact.
location /myapp/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /myapp;
}
