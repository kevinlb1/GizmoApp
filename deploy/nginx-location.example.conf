# Example nginx location block when the app is mounted at /AI100/
# The Flask app is prefix-aware, so proxy_pass intentionally keeps the URI intact.
location /AI100/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /AI100;
}

