server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Shared path-based app routes live here, one file per app.
    include /etc/nginx/gizmoapp-instances/*.conf;

    # Optional simple root response for the bare host.
    location = / {
        default_type text/plain;
        return 200 "vickrey10.cs.ubc.ca is up\n";
    }
}
