<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ shell_description }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <base href="{{ base_href }}">
    <link rel="manifest" href="{{ manifest_url }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_url }}">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body class="text-shell-body">
    <div class="text-shell">
      <header class="text-topbar">
        <div>
          <p class="text-eyebrow">{{ shell_label }} shell</p>
          <h1>{{ app_name }}</h1>
        </div>
        <div class="text-actions" aria-label="App status">
          <span class="text-health" id="text-health-pill">Booting</span>
          <span class="text-chip">DB <strong id="db-value">...</strong></span>
          <span class="text-chip">Path <strong id="prefix-value">/</strong></span>
          <button class="text-install" id="install-button" hidden>Install</button>
          <a class="text-link" href="{{ admin_url }}">Admin</a>
        </div>
      </header>

      <main class="text-blank" aria-label="Blank text workspace">
        <p>Blank workspace</p>
      </main>
    </div>

    <p id="install-hint" hidden></p>
    <span id="mode-value" hidden>Public</span>
    <span id="shell-value" hidden>{{ shell_label }}</span>
    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
