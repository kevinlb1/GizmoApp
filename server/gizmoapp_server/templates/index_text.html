<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ shell_description }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <base href="{{ base_href }}">
    <link rel="manifest" href="{{ manifest_url }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_url }}">
    <link rel="stylesheet" href="{{ shared_asset_base }}base.css">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body class="shell-body text-shell-body">
    <nav class="template-chrome" aria-label="Template controls">
      <span class="template-status-dot" id="text-health-pill" data-state="booting" aria-label="Status: booting" title="Booting"></span>
      <button class="template-command" id="install-button" hidden>Install</button>
      <a class="template-command" href="{{ admin_url }}">Admin</a>
    </nav>
    <div class="app-frame public-frame text-frame">
      <main class="text-workspace" aria-label="Text workspace">
        <section class="workspace-panel primary-panel" aria-label="Primary workspace">
          <div class="empty-state" aria-label="Blank workspace"></div>
        </section>
      </main>
    </div>

    <p id="install-hint" hidden></p>
    <span id="shell-value" hidden>{{ shell_label }}</span>
    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
