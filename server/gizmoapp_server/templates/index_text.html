<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ shell_description }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <base href="{{ base_href }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="stylesheet" href="{{ shared_asset_base }}base.css">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body class="shell-body text-shell-body">
    <div class="app-frame public-frame text-frame">
      <main class="text-workspace" aria-label="Text workspace">
        <section class="workspace-panel primary-panel" aria-label="Primary workspace">
          <div class="empty-state" aria-label="Blank workspace"></div>
        </section>
      </main>
    </div>
    <div id="app-error" class="app-error" role="alert" aria-live="assertive" hidden></div>

    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script src="{{ shared_asset_base }}boot.js"></script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
