<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ app_tagline }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <base href="{{ base_href }}">
    <link rel="manifest" href="{{ manifest_url }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_url }}">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">{{ shell_label }} shell</p>
          <h1>{{ app_name }}</h1>
        </div>
        <div class="topbar-actions" aria-label="App status">
          <span class="health-pill" id="health-pill">Booting</span>
          <span class="status-chip">DB <strong id="db-value">...</strong></span>
          <span class="status-chip">Path <strong id="prefix-value">/</strong></span>
          <button class="install-button" id="install-button" hidden>Install</button>
          <a class="ghost-link" href="{{ admin_url }}">Admin</a>
        </div>
      </header>

      <main class="blank-stage" aria-label="Blank graphical workspace">
        <canvas id="scene-canvas" aria-label="Blank interactive canvas"></canvas>
        <p class="stage-note">Blank canvas</p>
      </main>
    </div>

    <p class="install-hint" id="install-hint" hidden></p>
    <span id="mode-value" hidden>Public</span>
    <span id="shell-value" hidden>{{ shell_label }}</span>
    <span id="api-value" hidden>Connecting</span>
    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
