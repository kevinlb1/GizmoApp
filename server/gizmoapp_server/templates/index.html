<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ app_tagline }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <base href="{{ base_href }}">
    <link rel="manifest" href="{{ manifest_url }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_url }}">
    <link rel="stylesheet" href="{{ shared_asset_base }}base.css">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body class="shell-body graphical-body">
    <div class="app-frame graphical-frame">
      <header class="app-topbar">
        <a class="brand-mark" href="{{ base_href }}" aria-label="{{ app_name }} home">G</a>
        <div class="brand-copy">
          <p class="shell-kicker">{{ shell_label }}</p>
          <h1>{{ app_name }}</h1>
        </div>
        <nav class="app-actions" aria-label="App controls">
          <span class="connection-indicator" id="health-pill" data-state="booting">Booting</span>
          <button class="command-button" id="install-button" hidden>Install</button>
          <a class="command-button" href="{{ admin_url }}">Admin</a>
        </nav>
      </header>

      <main class="graphics-workspace" aria-label="Graphical workspace">
        <canvas id="scene-canvas" aria-label="Blank graphical workspace"></canvas>
      </main>
    </div>

    <p class="install-hint" id="install-hint" hidden></p>
    <span id="mode-value" hidden>Public</span>
    <span id="shell-value" hidden>{{ shell_label }}</span>
    <span id="api-value" hidden>Connecting</span>
    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
