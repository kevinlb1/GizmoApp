<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_name }}</title>
    <meta name="description" content="{{ app_tagline }}">
    <meta name="theme-color" content="{{ theme_color }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <base href="{{ base_href }}">
    <link rel="manifest" href="{{ manifest_url }}">
    <link rel="icon" href="{{ icon_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_url }}">
    <link rel="stylesheet" href="{{ shared_asset_base }}base.css">
    <link rel="stylesheet" href="{{ asset_base }}styles.css">
  </head>
  <body class="shell-body graphical-body">
    <div class="app-frame public-frame graphical-frame">
      <main class="graphics-workspace" aria-label="Graphical workspace">
        <canvas id="scene-canvas" aria-label="Blank graphical workspace"></canvas>
      </main>
    </div>

    <script id="gizmoapp-config" type="application/json">{{ client_config | tojson }}</script>
    <script type="module" src="{{ asset_base }}main.js"></script>
  </body>
</html>
